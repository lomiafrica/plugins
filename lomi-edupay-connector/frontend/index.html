<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPay × lomi. Sandbox</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>EduPay × lomi. Connector</h1>
        <p>
          Sandbox for <code>POST /api/v1/fees/charge</code> — direct charges with
          <code>payment_reference</code> and school metadata. Phase 2 schools use
          <code>Lomi-Account</code> automatically from the registry.
        </p>
      </header>

      <section class="card">
        <h2>Pay school fee</h2>
        <form id="fee-form">
          <label>Rail</label>
          <select name="rail">
            <option value="mtn">MTN MoMo</option>
            <option value="wave">Wave</option>
            <option value="card">Card (Payment Elements)</option>
          </select>
          <label>Amount (XOF)</label>
          <input name="amount" type="number" min="100" value="25000" required />
          <label>Payment reference</label>
          <input name="payment_reference" value="FEE-2026-TERM1-00042" required />
          <label>School ID</label>
          <input name="school_id" value="school_pilot_001" required />
          <label>Student ID</label>
          <input name="student_id" value="STU-8842" required />
          <label>Fee code</label>
          <input name="fee_code" value="TUITION_TERM1" required />
          <label>Term ID</label>
          <input name="term_id" value="2026-T1" />
          <label>Parent name</label>
          <input name="customer_name" value="Aminata Diallo" required />
          <label>Parent email (required for card)</label>
          <input name="customer_email" type="email" value="parent@example.com" />
          <label>Parent phone (E.164)</label>
          <input name="customer_phone" value="+2250707070707" required />
          <button type="submit">Create charge</button>
        </form>
      </section>

      <section id="payment-section" class="card hidden">
        <h2>Card payment</h2>
        <div id="payment-element" class="payment-element-mount"></div>
        <p id="payment-errors" class="field-errors"></p>
        <button type="button" id="pay-card-button" disabled>Confirm card payment</button>
      </section>

      <section class="card">
        <h2>Response</h2>
        <pre id="output">{}</pre>
      </section>

      <section class="card">
        <h2>Webhook inbox (local)</h2>
        <button type="button" id="refresh-events">Refresh</button>
        <pre id="events-output">[]</pre>
      </section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
